<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Calculadora de Compras</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="PurchasingCalculator.Web.styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="icon" type="image/x-icon" href="_content/PurchasingCalculator.SharedUI/favicon.ico" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="_content/PurchasingCalculator.SharedUI/css/app.css" />

    <script defer src="_framework/blazor.webassembly.js"></script>
    <script defer src="_content/MudBlazor/MudBlazor.min.js"></script>
</head>

<body>

    <div id="app">
        <div id="loading-container">
            <img id="loading-logo" src="_content/PurchasingCalculator.SharedUI/images/PurchasingCalculatorLogo.svg" />
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro não tratado.
        <a href="" class="reload">Recarregar</a>
        <a class="dismiss">🗙</a>
    </div>

</body>

</html>
